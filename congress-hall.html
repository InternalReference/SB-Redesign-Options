<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Congress Hall — Technopark Design Options</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<a href="index.html#menu" class="back-btn">&larr; Main Menu</a>

<nav class="option-dots" aria-label="Design option navigation">
  <a href="#" class="dot" aria-label="Design Options"></a>
</nav>

<section class="hero slide">
  <div class="hero-media"><img class="media-img" src="images/congress-hall-original.png" alt="Congress Hall — Original Proposal" /></div>
  <div class="hero-scrim"></div>
  <div class="hero-caption">
    <h1>Congress Hall</h1>
    <p>Original Proposal</p>
  </div>
  <a href="#" class="scroll-cue">
    <span>Scroll</span>
    <span class="arrow"></span>
  </a>
</section>

<section class="option-slide slide greening-slide">
  <div class="hero-media">
    <div class="greening-stack">
      <img class="media-img greening-img" src="images/congress-hall-option-1.png" alt="Congress Hall — Design Options, stage 1" />
      <img class="media-img greening-img" src="images/congress-hall-option-2.png" alt="Congress Hall — Design Options, stage 2" />
      <img class="media-img greening-img" src="images/congress-hall-option-3.png" alt="Congress Hall — Design Options, stage 3" />
      <img class="media-img greening-img" src="images/congress-hall-option-4.png" alt="Congress Hall — Design Options, stage 4" />
      <img class="media-img greening-img" src="images/congress-hall-option-5.png" alt="Congress Hall — Design Options, stage 5" />
    </div>
  </div>
  <div class="hero-scrim"></div>
  <div class="hero-caption">
    <h1>Congress Hall</h1>
    <p>Design Options</p>
  </div>
  <div class="greening-control">
    <span class="greening-label">Slide to Darken</span>
    <input type="range" class="greening-slider" min="0" max="1000" value="0" aria-label="Slide to see the Congress Hall design options" />
  </div>
  <a href="#" class="scroll-cue">
    <span>Scroll</span>
    <span class="arrow"></span>
  </a>
</section>

<section class="closing slide">
  <a href="index.html#menu" class="menu-return-btn">Main Menu</a>
</section>

<script src="js/script.js"></script>
</body>
</html>
