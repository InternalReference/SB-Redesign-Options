<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Congress Hall — Technopark Design Options</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<a href="index.html#menu" class="back-btn">&larr; Main Menu</a>

<nav class="option-dots" aria-label="Design option navigation">
  <a href="#" class="dot" aria-label="Design Options"></a>
</nav>

<section class="hero slide">
  <div class="hero-media"><img class="media-img" src="images/congress-hall-original.png" alt="Congress Hall — Original Proposal" /></div>
  <div class="hero-scrim"></div>
  <div class="hero-caption">
    <h1>Congress Hall</h1>
    <p>Original Proposal</p>
  </div>
  <a href="#" class="scroll-cue">
    <span>Scroll</span>
    <span class="arrow"></span>
  </a>
</section>

<section class="option-slide slide config-slide">
  <div class="hero-media">
    <div class="config-stack">
      <img class="media-img config-img is-active" src="images/congress-hall-aluminium-burgundy.png" data-material="aluminium" data-seat="burgundy" alt="Congress Hall — Brushed Aluminium finish, Burgundy seating" />
      <img class="media-img config-img" src="images/congress-hall-aluminium-cream.png" data-material="aluminium" data-seat="cream" alt="Congress Hall — Brushed Aluminium finish, Cream seating" />
      <img class="media-img config-img" src="images/congress-hall-aluminium-darkbrown.png" data-material="aluminium" data-seat="darkbrown" alt="Congress Hall — Brushed Aluminium finish, Dark Brown seating" />
      <img class="media-img config-img" src="images/congress-hall-brass-burgundy.png" data-material="brass" data-seat="burgundy" alt="Congress Hall — Brushed Brass finish, Burgundy seating" />
      <img class="media-img config-img" src="images/congress-hall-brass-cream.png" data-material="brass" data-seat="cream" alt="Congress Hall — Brushed Brass finish, Cream seating" />
      <img class="media-img config-img" src="images/congress-hall-brass-darkbrown.png" data-material="brass" data-seat="darkbrown" alt="Congress Hall — Brushed Brass finish, Dark Brown seating" />
      <img class="media-img config-img" src="images/congress-hall-copper-burgundy.png" data-material="copper" data-seat="burgundy" alt="Congress Hall — Brushed Copper finish, Burgundy seating" />
      <img class="media-img config-img" src="images/congress-hall-copper-cream.png" data-material="copper" data-seat="cream" alt="Congress Hall — Brushed Copper finish, Cream seating" />
      <img class="media-img config-img" src="images/congress-hall-copper-darkbrown.png" data-material="copper" data-seat="darkbrown" alt="Congress Hall — Brushed Copper finish, Dark Brown seating" />
      <img class="media-img config-img" src="images/congress-hall-sycamore-burgundy.png" data-material="sycamore" data-seat="burgundy" alt="Congress Hall — Sycamore finish, Burgundy seating" />
      <img class="media-img config-img" src="images/congress-hall-sycamore-cream.png" data-material="sycamore" data-seat="cream" alt="Congress Hall — Sycamore finish, Cream seating" />
      <img class="media-img config-img" src="images/congress-hall-sycamore-darkbrown.png" data-material="sycamore" data-seat="darkbrown" alt="Congress Hall — Sycamore finish, Dark Brown seating" />
    </div>
  </div>
  <div class="hero-scrim"></div>

  <div class="config-panel">
    <h1>Congress Hall</h1>
    <p class="config-selection">Brushed Aluminium &middot; Burgundy seating</p>

    <div class="config-group">
      <span class="config-group-label">Finish</span>
      <div class="config-swatches">
        <button type="button" class="swatch swatch--material is-active" data-material="aluminium">
          <span class="swatch-dot" style="--chip:linear-gradient(135deg,#dde0e4,#a6aab0)"></span>
          <span class="swatch-name">Brushed Aluminium</span>
        </button>
        <button type="button" class="swatch swatch--material" data-material="brass">
          <span class="swatch-dot" style="--chip:linear-gradient(135deg,#e7c877,#b8912f)"></span>
          <span class="swatch-name">Brushed Brass</span>
        </button>
        <button type="button" class="swatch swatch--material" data-material="copper">
          <span class="swatch-dot" style="--chip:linear-gradient(135deg,#c67b52,#8a4b2f)"></span>
          <span class="swatch-name">Brushed Copper</span>
        </button>
        <button type="button" class="swatch swatch--material" data-material="sycamore">
          <span class="swatch-dot" style="--chip:linear-gradient(135deg,#d8c39a,#b2946a)"></span>
          <span class="swatch-name">Sycamore</span>
        </button>
      </div>
    </div>

    <div class="config-group">
      <span class="config-group-label">Seating</span>
      <div class="config-swatches">
        <button type="button" class="swatch swatch--seat" data-seat="cream">
          <span class="swatch-dot" style="--chip:#e9e1cf"></span>
          <span class="swatch-name">Cream</span>
        </button>
        <button type="button" class="swatch swatch--seat is-active" data-seat="burgundy">
          <span class="swatch-dot" style="--chip:#6e2233"></span>
          <span class="swatch-name">Burgundy</span>
        </button>
        <button type="button" class="swatch swatch--seat" data-seat="darkbrown">
          <span class="swatch-dot" style="--chip:#3d2b22"></span>
          <span class="swatch-name">Dark Brown</span>
        </button>
      </div>
    </div>
  </div>

  <a href="#" class="scroll-cue">
    <span>Scroll</span>
    <span class="arrow"></span>
  </a>
</section>

<section class="closing slide">
  <a href="index.html#menu" class="menu-return-btn">Main Menu</a>
</section>

<script src="js/script.js"></script>
</body>
</html>
