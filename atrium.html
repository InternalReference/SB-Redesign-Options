<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atrium — Technopark Design Options</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<a href="index.html#menu" class="back-btn">&larr; Main Menu</a>

<nav class="option-dots" aria-label="Design option navigation">
  <a href="#" class="dot" aria-label="Design Option 1"></a>
  <a href="#" class="dot" aria-label="Design Option 2"></a>
  <a href="#" class="dot" aria-label="Design Option 3"></a>
  <a href="#" class="dot" aria-label="Design Option 4"></a>
</nav>

<section class="hero slide">
  <div class="hero-media"><img class="media-img" src="images/atrium-original.png" alt="Atrium — Original Proposal" /></div>
  <div class="hero-scrim"></div>
  <div class="hero-caption">
    <h1>Atrium</h1>
    <p>Original Proposal</p>
  </div>
  <a href="#" class="scroll-cue">
    <span>Scroll</span>
    <span class="arrow"></span>
  </a>
</section>

<section class="option-slide slide greening-slide">
  <div class="hero-media">
    <div class="greening-stack">
      <img class="media-img greening-img" src="images/atrium-greening/1.png" alt="Atrium — Design Option 1, greening stage 1" />
      <img class="media-img greening-img" src="images/atrium-greening/2.png" alt="Atrium — Design Option 1, greening stage 2" />
      <img class="media-img greening-img" src="images/atrium-greening/3.png" alt="Atrium — Design Option 1, greening stage 3" />
      <img class="media-img greening-img" src="images/atrium-greening/4.png" alt="Atrium — Design Option 1, greening stage 4" />
      <img class="media-img greening-img" src="images/atrium-greening/5.png" alt="Atrium — Design Option 1, greening stage 5" />
    </div>
  </div>
  <div class="hero-scrim"></div>
  <div class="hero-caption">
    <h1>Atrium</h1>
    <p>Design Option 1</p>
  </div>
  <div class="greening-control">
    <span class="greening-label">Slide to Green</span>
    <input type="range" class="greening-slider" min="0" max="1000" value="0" aria-label="Slide to see the Atrium progressively greened" />
  </div>
  <a href="#" class="scroll-cue">
    <span>Scroll</span>
    <span class="arrow"></span>
  </a>
</section>

<section class="option-slide slide">
  <div class="hero-media"><img class="media-img" src="images/atrium-option-2.png" alt="Atrium — Design Option 2" /></div>
  <div class="hero-scrim"></div>
  <div class="hero-caption">
    <h1>Atrium</h1>
    <p>Design Option 2</p>
  </div>
  <a href="#" class="scroll-cue">
    <span>Scroll</span>
    <span class="arrow"></span>
  </a>
</section>

<section class="option-slide slide">
  <div class="hero-media"><img class="media-img" src="images/atrium-option-3.png" alt="Atrium — Design Option 3" /></div>
  <div class="hero-scrim"></div>
  <div class="hero-caption">
    <h1>Atrium</h1>
    <p>Design Option 3</p>
  </div>
  <a href="#" class="scroll-cue">
    <span>Scroll</span>
    <span class="arrow"></span>
  </a>
</section>

<section class="option-slide slide">
  <div class="hero-media"><img class="media-img" src="images/atrium-option-4.png" alt="Atrium — Design Option 4" /></div>
  <div class="hero-scrim"></div>
  <div class="hero-caption">
    <h1>Atrium</h1>
    <p>Design Option 4</p>
  </div>
  <a href="#" class="scroll-cue">
    <span>Scroll</span>
    <span class="arrow"></span>
  </a>
</section>

<section class="closing slide">
  <a href="index.html#menu" class="menu-return-btn">Main Menu</a>
</section>

<script src="js/script.js"></script>
</body>
</html>
